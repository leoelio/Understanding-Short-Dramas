<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>半句 Android 测试包下载</title>
    <link rel="icon" href="/assets/brand/banju-icon.png" />
    <style>
      :root {
        color-scheme: light;
        --ink: #12141a;
        --muted: #687082;
        --line: rgba(20, 26, 38, 0.12);
        --blue: #0a66ff;
        --orange: #ff8a28;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC",
          "Microsoft YaHei", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 24% 12%, rgba(10, 102, 255, 0.18), transparent 34%),
          radial-gradient(circle at 82% 24%, rgba(255, 138, 40, 0.18), transparent 30%),
          linear-gradient(145deg, #f7f9fd 0%, #eef2f8 48%, #fff7ef 100%);
      }

      main {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 42px 0;
      }

      .shell {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.76);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.68);
        box-shadow: 0 28px 90px rgba(33, 44, 70, 0.16);
        backdrop-filter: blur(24px);
      }

      .hero {
        display: grid;
        grid-template-columns: 1fr 260px;
        gap: 28px;
        padding: 42px;
        align-items: center;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-size: clamp(40px, 8vw, 72px);
        letter-spacing: 0;
        line-height: 0.96;
      }

      .subtitle {
        max-width: 560px;
        margin: 18px 0 0;
        color: #3b4353;
        font-size: 18px;
        line-height: 1.65;
      }

      .brand-card {
        display: grid;
        place-items: center;
        min-height: 260px;
        border-radius: 28px;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(236, 243, 255, 0.72)),
          radial-gradient(circle at 70% 30%, rgba(255, 138, 40, 0.22), transparent 38%);
        border: 1px solid rgba(255, 255, 255, 0.9);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

      .brand-card img {
        width: 156px;
        height: 156px;
        border-radius: 34px;
        box-shadow: 0 24px 60px rgba(10, 102, 255, 0.18);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 22px;
        border-radius: 999px;
        color: #fff;
        text-decoration: none;
        font-weight: 800;
        background: linear-gradient(135deg, var(--blue), #0047c6);
        box-shadow: 0 14px 34px rgba(10, 102, 255, 0.26);
        transition:
          transform 180ms ease,
          box-shadow 180ms ease;
      }

      .button:active {
        transform: scale(0.98);
        box-shadow: 0 8px 20px rgba(10, 102, 255, 0.24);
      }

      .button.secondary {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid var(--line);
        box-shadow: none;
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1px;
        background: var(--line);
      }

      .meta section {
        padding: 24px;
        background: rgba(255, 255, 255, 0.58);
      }

      .meta h2 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .meta p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.7;
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: rgba(20, 26, 38, 0.06);
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 520px);
          padding: 18px 0;
        }

        .shell {
          border-radius: 26px;
        }

        .hero {
          grid-template-columns: 1fr;
          padding: 28px;
        }

        .brand-card {
          min-height: 190px;
          order: -1;
        }

        .brand-card img {
          width: 128px;
          height: 128px;
        }

        .meta {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="shell">
        <div class="hero">
          <section>
            <p class="eyebrow">Android 测试包</p>
            <h1>半句</h1>
            <p class="subtitle">
              短剧陪伴体验包。当前版本用于比赛演示和真机测试，打开后会连接当前公网演示服务。
            </p>
            <div class="actions">
              <a class="button" href="/downloads/banju-debug.apk" download>下载 Android 安装包</a>
              <a class="button secondary" href="/">先打开 Web 版</a>
            </div>
          </section>
          <div class="brand-card" aria-label="半句应用图标">
            <img src="/assets/brand/banju-icon.png" alt="半句" />
          </div>
        </div>
        <div class="meta">
          <section>
            <h2>安装方式</h2>
            <p>安卓手机打开本页，下载 APK 后允许浏览器安装未知来源应用。</p>
          </section>
          <section>
            <h2>版本说明</h2>
            <p>这是 debug 测试包，包名 <code>com.banju.shortdrama</code>，用于功能体验。</p>
          </section>
          <section>
            <h2>公网限制</h2>
            <p>当前链接依赖临时隧道。隧道关闭后，需要重新生成下载链接并重打包。</p>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
