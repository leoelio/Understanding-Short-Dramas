<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>短剧互动激发系统</title>
    <link rel="stylesheet" href="/styles.css?v=20260526-interactive-stickers" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">AI Drama Interaction</p>
          <h1>短剧互动激发</h1>
        </div>
        <nav class="tabs">
          <button id="homeTab" class="tab active" type="button">短剧</button>
          <button id="adminTab" class="tab" type="button">统计</button>
          <button id="reviewTab" class="tab" type="button">复核</button>
        </nav>
      </header>

      <main>
        <section id="homeView" class="view active">
          <div class="section-head">
            <div>
              <h2>短剧列表</h2>
              <p>选择一部短剧，进入移动端播放互动体验。</p>
            </div>
            <span id="dramaCount" class="pill">加载中</span>
          </div>
          <div id="dramaGrid" class="drama-grid"></div>
        </section>

        <section id="watchView" class="view">
          <button id="backButton" class="ghost-button" type="button">返回列表</button>
          <div class="player-card">
            <div class="player-title">
              <div>
                <p id="watchGenre" class="eyebrow">短剧播放</p>
                <h2 id="watchTitle">加载中</h2>
              </div>
              <select id="episodeSelect" class="episode-select" aria-label="选择剧集"></select>
            </div>
            <div class="video-wrap">
              <video id="player" playsinline preload="metadata"></video>
              <div id="danmakuLayer" class="danmaku-layer"></div>
              <div id="stickerLayer" class="sticker-layer" aria-hidden="true"></div>
              <div id="interactionLayer" class="interaction-layer hidden"></div>
              <div id="themeControls" class="theme-controls">
                <button id="playToggle" class="theme-icon-button" type="button" aria-label="播放">▶</button>
                <input id="progressSlider" class="theme-progress" type="range" min="0" max="1000" value="0" />
                <span id="playerTime" class="player-time">00:00 / 00:00</span>
                <button id="muteToggle" class="theme-icon-button" type="button" aria-label="静音">♪</button>
              </div>
            </div>
            <div class="watch-tools">
              <div class="mode-switch" aria-label="弹幕模式">
                <button class="mode-button active" type="button" data-mode="light">轻聊</button>
                <button class="mode-button" type="button" data-mode="carnival">狂欢</button>
                <button class="mode-button" type="button" data-mode="immerse">沉浸</button>
              </div>
              <button id="danmakuSettingsToggle" class="ghost-button icon-button" type="button">弹幕</button>
            </div>
            <div id="danmakuSettings" class="danmaku-settings">
              <label>
                字号
                <select id="danmakuFontSize" class="episode-select">
                  <option value="small">小</option>
                  <option value="medium">中</option>
                  <option value="large">大</option>
                </select>
              </label>
              <label>
                速度
                <select id="danmakuSpeed" class="episode-select">
                  <option value="slow">慢</option>
                  <option value="normal">中</option>
                  <option value="fast">快</option>
                </select>
              </label>
              <label>
                区域
                <select id="danmakuArea" class="episode-select">
                  <option value="top">顶部</option>
                  <option value="middle">中部</option>
                  <option value="full">全屏</option>
                </select>
              </label>
              <label>
                透明度
                <input id="danmakuOpacity" type="range" min="35" max="100" value="82" />
              </label>
            </div>
            <form id="danmakuForm" class="danmaku-form">
              <input id="danmakuInput" maxlength="40" placeholder="发一条弹幕" />
              <button class="primary-button" type="submit">发送</button>
            </form>
            <div id="danmakuFeedback" class="danmaku-feedback" aria-live="polite"></div>
            <div id="timeline" class="timeline"></div>
          </div>
        </section>

        <section id="adminView" class="view">
          <div class="section-head">
            <div>
              <h2>后台统计</h2>
              <p>查看高光点点击量、选择比例和互动榜。</p>
            </div>
            <button id="refreshStats" class="primary-button" type="button">刷新</button>
          </div>
          <div id="summaryCards" class="summary-grid"></div>
          <div class="table-card">
            <div class="table-title">
              <h3>高光互动榜</h3>
              <span id="statsHint" class="muted">按点击量排序</span>
            </div>
            <div id="statsList" class="stats-list"></div>
          </div>
        </section>

        <section id="reviewView" class="view">
          <div class="section-head">
            <div>
              <h2>标注复核</h2>
              <p>编辑高光点 JSON，保存后立即更新播放页和统计页。</p>
            </div>
            <button id="saveReview" class="primary-button" type="button">保存</button>
          </div>
          <div id="reviewSummaryCards" class="summary-grid review-summary"></div>
          <div class="review-toolbar">
            <select id="reviewStatusFilter" class="episode-select" aria-label="筛选复核状态">
              <option value="all">全部剧集</option>
              <option value="pending">待复核</option>
              <option value="reviewed">已复核</option>
            </select>
            <select id="reviewEpisodeSelect" class="episode-select" aria-label="选择复核剧集"></select>
            <button id="reloadReview" class="ghost-button" type="button">重新加载</button>
            <button id="formatReview" class="ghost-button" type="button">格式化</button>
          </div>
          <div class="review-layout">
            <textarea id="reviewJson" spellcheck="false" aria-label="高光点 JSON"></textarea>
            <div>
              <div id="reviewStatus" class="review-status">请选择剧集</div>
              <div id="reviewPreview" class="review-preview"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="/app.js?v=20260526-interactive-stickers"></script>
  </body>
</html>
